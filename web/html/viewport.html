<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YAK 3D Viewport</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
  #viewport { width: 100%; height: 100%; display: block; }
  #status {
    position: absolute; bottom: 8px; left: 8px;
    color: #888; font: 11px/1.4 monospace;
    pointer-events: none; user-select: none;
  }
  #empty-msg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #555; font: 13px/1.4 sans-serif; text-align: center;
    pointer-events: none; user-select: none;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "@mkkellogg/gaussian-splats-3d": "https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.6/build/gaussian-splats-3d.module.min.js"
  }
}
</script>
</head>
<body>
<canvas id="viewport"></canvas>
<div id="status"></div>
<div id="empty-msg">Connect mesh or splat inputs and execute to view</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

// ── State ──────────────────────────────────────────────────────────────────
let renderer, scene, camera, controls;
let splatViewer = null;
const loadedObjects = [];
const statusEl = document.getElementById('status');
const emptyEl = document.getElementById('empty-msg');

// ── Init Three.js ──────────────────────────────────────────────────────────
function init() {
  const canvas = document.getElementById('viewport');

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;

  scene = new THREE.Scene();
  scene.background = new THREE.Color('#1a1a1a');

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(5, 5, 5);

  controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.target.set(0, 0, 0);
  controls.update();

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
  fillLight.position.set(-5, 3, -5);
  scene.add(fillLight);

  window.addEventListener('resize', onResize);
  animate();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ── Grid helper ────────────────────────────────────────────────────────────
let gridHelper = null;

function setGrid(show) {
  if (gridHelper) { scene.remove(gridHelper); gridHelper = null; }
  if (show) {
    gridHelper = new THREE.GridHelper(20, 20, 0x333333, 0x222222);
    scene.add(gridHelper);
  }
}

// ── Clear scene ────────────────────────────────────────────────────────────
function clearScene() {
  for (const obj of loadedObjects) {
    scene.remove(obj);
    obj.traverse?.(child => {
      child.geometry?.dispose();
      if (child.material) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => { m.map?.dispose(); m.dispose(); });
      }
    });
  }
  loadedObjects.length = 0;

  if (splatViewer) {
    scene.remove(splatViewer);
    splatViewer.dispose?.();
    splatViewer = null;
  }
}

// ── Load mesh ──────────────────────────────────────────────────────────────
async function loadMesh(filepath) {
  const url = `/yak/viewfile?filepath=${encodeURIComponent(filepath)}`;
  const ext = filepath.split('.').pop().toLowerCase();

  return new Promise((resolve, reject) => {
    const onLoad = (result) => {
      const obj = result.scene || result;
      scene.add(obj);
      loadedObjects.push(obj);
      resolve(obj);
    };

    if (ext === 'glb' || ext === 'gltf') {
      new GLTFLoader().load(url, onLoad, undefined, reject);
    } else if (ext === 'obj') {
      new OBJLoader().load(url, (obj) => {
        scene.add(obj);
        loadedObjects.push(obj);
        resolve(obj);
      }, undefined, reject);
    } else if (ext === 'fbx') {
      new FBXLoader().load(url, (obj) => {
        // FBX files often have huge scale
        const box = new THREE.Box3().setFromObject(obj);
        const size = box.getSize(new THREE.Vector3()).length();
        if (size > 50) {
          const s = 10 / size;
          obj.scale.set(s, s, s);
        }
        scene.add(obj);
        loadedObjects.push(obj);
        resolve(obj);
      }, undefined, reject);
    } else {
      reject(new Error(`Unsupported mesh format: .${ext}`));
    }
  });
}

// ── Load splats ────────────────────────────────────────────────────────────
async function loadSplats(splatPaths) {
  if (!splatPaths.length) return;

  splatViewer = new GaussianSplats3D.DropInViewer({
    gpuAcceleratedSort: true,
    sharedMemoryForWorkers: false,
    dynamicScene: false,
  });

  for (const filepath of splatPaths) {
    const url = `/yak/viewfile?filepath=${encodeURIComponent(filepath)}`;
    await splatViewer.addSplatScene(url, {
      showLoadingUI: false,
      progressiveLoad: true,
    });
  }

  scene.add(splatViewer);
  loadedObjects.push(splatViewer);
}

// ── Auto-frame camera ──────────────────────────────────────────────────────
function frameCameraOnScene() {
  const box = new THREE.Box3();
  let hasContent = false;

  for (const obj of loadedObjects) {
    if (obj === splatViewer) continue; // splat viewer bbox not reliable
    const b = new THREE.Box3().setFromObject(obj);
    if (!b.isEmpty()) {
      box.union(b);
      hasContent = true;
    }
  }

  if (!hasContent) return;

  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3()).length();
  const dist = size * 1.5;

  camera.position.set(center.x + dist * 0.5, center.y + dist * 0.5, center.z + dist * 0.5);
  controls.target.copy(center);
  controls.update();
}

// ── Message handler ────────────────────────────────────────────────────────
window.addEventListener('message', async (event) => {
  const data = event.data;
  if (!data || data.type !== 'yak_viewport_data') return;

  emptyEl.style.display = 'none';
  clearScene();

  // Background color
  if (data.bg_color) {
    scene.background = new THREE.Color(data.bg_color);
    document.body.style.background = data.bg_color;
  }

  // Grid
  setGrid(data.grid !== false);

  const meshes = data.meshes || [];
  const splats = data.splats || [];

  statusEl.textContent = `Loading ${meshes.length} mesh(es), ${splats.length} splat(s)...`;

  let errors = 0;

  // Load meshes
  for (const path of meshes) {
    try {
      await loadMesh(path);
    } catch (e) {
      console.error('Failed to load mesh:', path, e);
      errors++;
    }
  }

  // Load splats
  try {
    await loadSplats(splats);
  } catch (e) {
    console.error('Failed to load splats:', e);
    errors++;
  }

  // Frame camera
  frameCameraOnScene();

  const total = meshes.length + splats.length;
  if (errors > 0) {
    statusEl.textContent = `Loaded ${total - errors}/${total} assets (${errors} failed)`;
  } else {
    statusEl.textContent = `${meshes.length} mesh(es), ${splats.length} splat(s)`;
  }
});

// ── Boot ───────────────────────────────────────────────────────────────────
init();
setGrid(true);
</script>
</body>
</html>
